name: Daily News Digest

on:
  # Run daily at 7:00 AM UTC (adjust to your timezone)
  schedule:
    - cron: '0 7 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  trigger-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Digest Endpoint
        env:
          RENDER_URL: ${{ secrets.RENDER_APP_URL }}
          AUTH_SECRET: ${{ secrets.DIGEST_SECRET }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "❌ ERROR: RENDER_APP_URL secret not set"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "Add: RENDER_APP_URL = https://your-app.onrender.com"
            exit 1
          fi
          
          echo "🚀 Triggering digest at: ${RENDER_URL}/api/trigger-digest-fast"
          
          curl -X POST "${RENDER_URL}/api/trigger-digest-fast" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${AUTH_SECRET}" \
            --fail \
            --show-error \
            --max-time 180 \
            -w "\n✅ Status: %{http_code}\n"
      
      - name: Check Status
        if: success()
        run: echo "✅ Daily digest triggered successfully!"
      
      - name: Notify on Failure
        if: failure()
        run: echo "❌ Failed to trigger daily digest"
