name: Daily News Digest

on:
  # Run daily at 7:00 AM UTC (adjust to your timezone)
  schedule:
    - cron: '0 7 * * *'
  
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  trigger-digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Digest Endpoint
        run: |
          curl -X POST "${{ secrets.RENDER_APP_URL }}/api/trigger-digest" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DIGEST_SECRET }}" \
            --fail \
            --silent \
            --show-error
      
      - name: Check Status
        if: success()
        run: echo "✅ Daily digest triggered successfully!"
      
      - name: Notify on Failure
        if: failure()
        run: echo "❌ Failed to trigger daily digest"
