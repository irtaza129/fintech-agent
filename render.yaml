services:
  # Web Service (FastAPI + Frontend)
  - type: web
    name: fintech-ai-agent
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: LLM_TEMPERATURE
        value: 0.3
      - key: LLM_MAX_TOKENS
        value: 1000
      - key: EMAIL_ENABLED
        value: true
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: EMAIL_SENDER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: DIGEST_HOUR
        value: 7
      - key: DIGEST_MINUTE
        value: 0
      - key: DATABASE_URL
        value: sqlite:///./data/fintech_agent.db
      - key: CORS_ORIGINS
        value: "*"
    
    # Persistent disk for SQLite database
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
